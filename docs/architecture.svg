<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f8ff"/>
      <stop offset="1" stop-color="#eefcf4"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0046AD"/>
      <stop offset="1" stop-color="#00A651"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334"/>
    </marker>
    <marker id="arrowg" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00A651"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="8" fill="url(#brand)"/>

  <text x="40" y="52" font-size="30" font-weight="700" fill="#0a2a52">find-evil 🔎 — IOC-lifecycle layer for Protocol SIFT</text>
  <text x="40" y="80" font-size="16" fill="#3a566f">Architectural pattern: Direct Agent Extension (Claude Code) + Custom MCP Server</text>

  <!-- DATA SOURCES -->
  <rect x="40" y="120" width="200" height="300" rx="14" fill="#ffffff" stroke="#cfe0f5" stroke-width="2"/>
  <text x="140" y="150" font-size="15" font-weight="700" fill="#0046AD" text-anchor="middle">EVIDENCE / CASE DATA</text>
  <g font-size="13.5" fill="#234">
    <rect x="62" y="168" width="156" height="36" rx="8" fill="#eef4ff"/><text x="140" y="191" text-anchor="middle">💽 Disk images</text>
    <rect x="62" y="212" width="156" height="36" rx="8" fill="#eef4ff"/><text x="140" y="235" text-anchor="middle">🧠 Memory captures</text>
    <rect x="62" y="256" width="156" height="36" rx="8" fill="#eef4ff"/><text x="140" y="279" text-anchor="middle">📜 Log files</text>
    <rect x="62" y="300" width="156" height="36" rx="8" fill="#eef4ff"/><text x="140" y="323" text-anchor="middle">🌐 Network captures</text>
    <rect x="62" y="344" width="156" height="36" rx="8" fill="#eef4ff"/><text x="140" y="367" text-anchor="middle">🖥️ Remote endpoints</text>
  </g>
  <text x="140" y="404" font-size="11.5" fill="#789" text-anchor="middle">read-only originals</text>

  <!-- SIFT TOOLS -->
  <rect x="290" y="120" width="210" height="300" rx="14" fill="#ffffff" stroke="#cfe0f5" stroke-width="2"/>
  <text x="395" y="150" font-size="15" font-weight="700" fill="#0046AD" text-anchor="middle">SIFT FORENSIC TOOLS</text>
  <text x="395" y="168" font-size="11.5" fill="#789" text-anchor="middle">200+ CLIs on the workstation</text>
  <g font-size="13.5" fill="#234">
    <rect x="312" y="184" width="166" height="34" rx="8" fill="#f0fbf4"/><text x="395" y="206" text-anchor="middle">Plaso / log2timeline</text>
    <rect x="312" y="226" width="166" height="34" rx="8" fill="#f0fbf4"/><text x="395" y="248" text-anchor="middle">Volatility 3</text>
    <rect x="312" y="268" width="166" height="34" rx="8" fill="#f0fbf4"/><text x="395" y="290" text-anchor="middle">Sleuth Kit · EZ Tools</text>
    <rect x="312" y="310" width="166" height="34" rx="8" fill="#f0fbf4"/><text x="395" y="332" text-anchor="middle">YARA</text>
  </g>
  <text x="395" y="372" font-size="12" fill="#456" text-anchor="middle">emit large raw</text>
  <text x="395" y="390" font-size="12" font-weight="700" fill="#456" text-anchor="middle">TEXT dumps ▼</text>

  <!-- AGENT -->
  <rect x="550" y="150" width="220" height="240" rx="14" fill="#0a2a52"/>
  <text x="660" y="182" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">PROTOCOL SIFT</text>
  <text x="660" y="204" font-size="13" fill="#bcd4f5" text-anchor="middle">= Claude Code agent</text>
  <line x1="572" y1="218" x2="748" y2="218" stroke="#2b4d7a"/>
  <text x="660" y="244" font-size="12.5" fill="#e7f0ff" text-anchor="middle">runs tools via shell</text>
  <rect x="572" y="258" width="176" height="60" rx="10" fill="#16395f"/>
  <text x="660" y="280" font-size="12.5" fill="#ffd9d0" text-anchor="middle">❌ baseline: eyeballs</text>
  <text x="660" y="298" font-size="12.5" fill="#ffd9d0" text-anchor="middle">dumps → hallucinates</text>
  <rect x="572" y="326" width="176" height="48" rx="10" fill="#0c5b34"/>
  <text x="660" y="346" font-size="12.5" fill="#d6ffe7" text-anchor="middle">✅ find-evil: calls MCP,</text>
  <text x="660" y="363" font-size="12.5" fill="#d6ffe7" text-anchor="middle">then reconciles</text>

  <!-- TRUST BOUNDARY -->
  <line x1="810" y1="110" x2="810" y2="650" stroke="#00A651" stroke-width="2.5" stroke-dasharray="2 0"/>
  <rect x="786" y="112" width="48" height="22" rx="6" fill="#00A651"/>
  <text x="810" y="128" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">🛡️</text>
  <text x="810" y="98" font-size="12.5" font-weight="700" fill="#0c7a45" text-anchor="middle">ARCHITECTURAL TRUST BOUNDARY</text>

  <!-- MCP SERVER -->
  <rect x="850" y="120" width="390" height="300" rx="14" fill="#ffffff" stroke="#9fe0bd" stroke-width="2.5"/>
  <text x="1045" y="150" font-size="16" font-weight="700" fill="#0c7a45" text-anchor="middle">iocflow MCP SERVER (typed, stdio)</text>
  <text x="1045" y="170" font-size="11.5" fill="#789" text-anchor="middle">text in → structured dict out · no execute_shell</text>
  <g font-size="13" fill="#173">
    <rect x="872" y="184" width="346" height="32" rx="8" fill="#eafaf1"/><text x="884" y="205">extract_iocs() — re-fang · PSL · hash-dedup · LOLBin-aware</text>
    <rect x="872" y="222" width="346" height="32" rx="8" fill="#eafaf1"/><text x="884" y="243">enrich_indicators() — VT · AbuseIPDB · abuse.ch</text>
    <rect x="872" y="260" width="346" height="32" rx="8" fill="#eafaf1"/><text x="884" y="281">assess_indicators() — severity · narrative</text>
    <rect x="872" y="298" width="346" height="32" rx="8" fill="#eafaf1"/><text x="884" y="319">suggest_hunts() — CQL · XQL · Sigma</text>
    <rect x="872" y="336" width="346" height="32" rx="8" fill="#fff3ec"/><text x="884" y="357">propose_blocks() — 🚫 DRY-RUN only (no execute path)</text>
    <rect x="872" y="374" width="346" height="32" rx="8" fill="#eafaf1"/><text x="884" y="395">to_stix / from_stix — STIX 2.1 round-trip</text>
  </g>

  <!-- OPTIONAL PIVOT -->
  <rect x="850" y="430" width="390" height="56" rx="12" fill="#f3fbf7" stroke="#9fe0bd" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="864" y="452" font-size="12.5" font-weight="700" fill="#0c7a45">domainflow-pivot MCP (optional breadth)</text>
  <text x="864" y="472" font-size="12" fill="#173">cluster_actor_infrastructure() — extracted domains → actor campaign</text>

  <!-- OUTPUTS -->
  <rect x="850" y="500" width="390" height="180" rx="14" fill="#ffffff" stroke="#cfe0f5" stroke-width="2"/>
  <text x="1045" y="528" font-size="15" font-weight="700" fill="#0046AD" text-anchor="middle">OUTPUT PIPELINE</text>
  <g font-size="13" fill="#234">
    <rect x="872" y="544" width="346" height="30" rx="8" fill="#eef4ff"/><text x="884" y="564">📄 Reconciled IOC report (confirmed / corrected / unverified)</text>
    <rect x="872" y="580" width="346" height="30" rx="8" fill="#eef4ff"/><text x="884" y="600">🎯 Hunt queries — "were we touched elsewhere?"</text>
    <rect x="872" y="616" width="346" height="30" rx="8" fill="#eef4ff"/><text x="884" y="636">🧾 Dry-run block plan → human approval (gated)</text>
  </g>

  <!-- SELF-CORRECTION LOOP -->
  <rect x="550" y="470" width="220" height="120" rx="14" fill="#0c5b34"/>
  <text x="660" y="498" font-size="14.5" font-weight="700" fill="#fff" text-anchor="middle">🔁 SELF-CORRECTION</text>
  <text x="660" y="522" font-size="12" fill="#d6ffe7" text-anchor="middle">reconcile eyeballed vs.</text>
  <text x="660" y="539" font-size="12" fill="#d6ffe7" text-anchor="middle">extractor ground truth</text>
  <text x="660" y="561" font-size="12" fill="#d6ffe7" text-anchor="middle">correct values · flag</text>
  <text x="660" y="578" font-size="12" fill="#d6ffe7" text-anchor="middle">hallucinations · add misses</text>

  <!-- FLOW ARROWS -->
  <line x1="240" y1="270" x2="286" y2="270" stroke="#334" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="270" x2="546" y2="270" stroke="#334" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="770" y1="290" x2="846" y2="290" stroke="#334" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="808" y="282" font-size="11" fill="#456" text-anchor="middle">raw text</text>
  <!-- mcp results back to agent -->
  <path d="M870,420 C840,470 800,470 772,440" fill="none" stroke="#00A651" stroke-width="2" marker-end="url(#arrowg)"/>
  <text x="846" y="466" font-size="11" fill="#0c7a45">structured IOCs</text>
  <!-- agent to self-correction -->
  <line x1="660" y1="390" x2="660" y2="466" stroke="#00A651" stroke-width="2" marker-end="url(#arrowg)"/>
  <!-- self-correction to outputs -->
  <line x1="770" y1="560" x2="846" y2="575" stroke="#00A651" stroke-width="2" marker-end="url(#arrowg)"/>

  <!-- LEGEND -->
  <rect x="40" y="470" width="470" height="210" rx="14" fill="#ffffff" stroke="#dde7f2" stroke-width="2"/>
  <text x="60" y="500" font-size="15" font-weight="700" fill="#0a2a52">Where security boundaries are enforced</text>

  <rect x="60" y="516" width="26" height="26" rx="6" fill="#00A651"/>
  <text x="74" y="534" font-size="13" fill="#fff" text-anchor="middle">🛡️</text>
  <text x="98" y="528" font-size="13.5" font-weight="700" fill="#0c7a45">ARCHITECTURAL (enforced, not bypassable)</text>
  <text x="98" y="546" font-size="12.5" fill="#234">• MCP is text-in / dict-out — no execute_shell exposed</text>
  <text x="98" y="564" font-size="12.5" fill="#234">• block execution path simply is not a tool</text>
  <text x="98" y="582" font-size="12.5" fill="#234">• raw dumps parsed in-server → no context flooding</text>

  <line x1="60" y1="598" x2="490" y2="598" stroke="#e3e9f0"/>
  <rect x="60" y="610" width="26" height="26" rx="6" fill="#fff" stroke="#c9a227" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="98" y="622" font-size="13.5" font-weight="700" fill="#9a7a10">PROMPT-BASED (guidance, bypassable)</text>
  <text x="98" y="640" font-size="12.5" fill="#234">• ioc-lifecycle SKILL.md tells the agent to reconcile</text>
  <text x="98" y="658" font-size="12.5" fill="#234">• LOLBin-caveat &amp; "flag unverified" instructions</text>

  <text x="40" y="724" font-size="12" fill="#789">Evidence integrity: originals are read-only; every reported indicator traces to the MCP tool call that produced it (audit trail in test/sample_execution_log.jsonl).</text>
</svg>
