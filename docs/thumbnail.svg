<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="DejaVu Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1326"/>
      <stop offset="1" stop-color="#10203f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ee6a6"/>
      <stop offset="1" stop-color="#23a3ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>

  <!-- kicker -->
  <text x="82" y="92" fill="#7f97c2" font-size="26" font-weight="700" letter-spacing="6">SANS · FIND EVIL! HACKATHON</text>

  <!-- title + magnifier -->
  <text x="78" y="222" fill="#f5f8ff" font-size="116" font-weight="800" letter-spacing="-2">find-evil</text>
  <g stroke="#2ee6a6" stroke-width="11" fill="none">
    <circle cx="770" cy="178" r="40"/>
    <line x1="800" y1="208" x2="838" y2="246" stroke-linecap="round"/>
  </g>

  <!-- subtitle -->
  <text x="82" y="300" fill="#cfe0ff" font-size="42" font-weight="600">Stops Protocol SIFT from hallucinating IOCs.</text>

  <!-- flow pills -->
  <g font-size="26" font-weight="700" letter-spacing="1.5" text-anchor="middle">
    <rect x="82" y="350" width="185" height="64" rx="14" fill="#15233f" stroke="#2a3c63" stroke-width="2"/>
    <text x="174" y="390" fill="#9fb6df">EXTRACT</text>

    <text x="293" y="392" fill="#5d76a6" font-size="32" letter-spacing="0">&#8594;</text>

    <rect x="320" y="350" width="472" height="64" rx="14" fill="#10241f" stroke="#2ee6a6" stroke-width="2.5"/>
    <text x="556" y="390" fill="#2ee6a6">RECONCILE · SELF-CORRECT</text>

    <text x="818" y="392" fill="#5d76a6" font-size="32" letter-spacing="0">&#8594;</text>

    <rect x="845" y="350" width="175" height="64" rx="14" fill="#15233f" stroke="#2a3c63" stroke-width="2"/>
    <text x="932" y="390" fill="#9fb6df">HUNT</text>
  </g>

  <!-- self-correction proof -->
  <text x="82" y="492" fill="#7f97c2" font-size="27" font-family="DejaVu Sans Mono, monospace">the agent corrects its own read:</text>
  <text x="82" y="538" font-size="34" font-family="DejaVu Sans Mono, monospace" font-weight="700">
    <tspan fill="#ff5d73">185.220.101.50</tspan><tspan fill="#5d76a6">  &#8594;  </tspan><tspan fill="#2ee6a6">185.220.101.5</tspan>
  </text>

  <!-- footer -->
  <text x="82" y="596" fill="#8aa0c6" font-size="25" font-weight="600">Custom MCP server + 6th SIFT skill   ·   built on open-source iocflow   ·   MIT</text>
</svg>
